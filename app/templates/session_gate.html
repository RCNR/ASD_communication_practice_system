<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
  <title>회기 시작 - ASD Communication Practice System</title>
</head>
<body>
  <a href="/home" class="home-icon-btn" aria-label="홈으로">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
  </a>
  <div class="card">
    <p class="session-progress">{{ phase_label }} 단계 · {{ session_number }}/{{ session_target }}회기</p>
    <h1>{{ phase_label }} 단계 {{ session_number }}회차를 시작할 준비가 되셨나요?</h1>
    <form method="post" action="/session/start">
      <button type="submit">{{ session_number }}회차 시작하기</button>
    </form>
  </div>
</body>
</html>
