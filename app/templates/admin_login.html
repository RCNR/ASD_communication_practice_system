<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>관리자 로그인 - ASD Communication Practice System</title>
</head>
<body>
  <h1>관리자 로그인</h1>

  <form method="post" action="/admin/login">
    <label>비밀번호: <input type="password" name="password" required /></label><br />
    <button type="submit">로그인</button>
  </form>
</body>
</html>
