<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
  <title>Ion</title>
</head>
<body>
  <div class="home-wrapper">
    <h1 class="brand-title">Ion</h1>
    <img class="brand-logo" src="/static/고려대학교_로고.png" alt="고려대학교 로고" />
    <div class="card">
      <div class="login-form">
        <h2>로그인</h2>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/login">
          <label>아이디
            <input type="text" name="participant_code" placeholder="아이디를 입력하세요" required />
          </label>
          <label>비밀번호
            <input type="password" name="password" placeholder="비밀번호를 입력하세요" required />
          </label>
          <button type="submit">로그인</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
