<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>참여자 추가 - ASD Communication Practice System</title>
</head>
<body>
  <p><a href="/admin">&larr; 참여자 목록</a></p>
  <h1>참여자 추가</h1>
  {% if error %}
  <p style="color: red;">{{ error }}</p>
  {% endif %}
  <form method="post" action="/admin/participants/new">
    <label>참여자 코드: <input type="text" name="participant_code" placeholder="P01" required /></label><br />
    <label>비밀번호: <input type="password" name="password" required /></label><br />
    <label>기초선 회기 수: <input type="number" name="baseline_length" value="3" min="1" required /></label><br />
    <button type="submit">추가</button>
  </form>
</body>
</html>
