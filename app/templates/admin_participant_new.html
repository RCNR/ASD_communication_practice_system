<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
  <title>참여자 추가 - ASD Communication Practice System</title>
</head>
<body>
  <div class="card">
    <p class="nav"><a href="/admin">&larr; 참여자 목록</a></p>
    <h1>참여자 추가</h1>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/participants/new">
      <label>참여자 코드
        <input type="text" name="participant_code" placeholder="P01" required />
      </label>
      <label>비밀번호
        <input type="password" name="password" required />
      </label>
      <label>기초선 회기 수
        <input type="number" name="baseline_length" value="3" min="1" required />
      </label>
      <label>중재 회기 수
        <input type="number" name="intervention_length" value="20" min="1" required />
      </label>
      <label>유지 회기 수
        <input type="number" name="maintenance_length" value="2" min="1" required />
      </label>

      <p class="section-title">기초선 단계 회기 간 대기시간</p>
      <div class="field-row">
        <input type="number" name="baseline_wait_d" value="0" min="0" />일
        <input type="number" name="baseline_wait_h" value="0" min="0" />시간
        <input type="number" name="baseline_wait_m" value="0" min="0" />분
        <input type="number" name="baseline_wait_s" value="0" min="0" />초
      </div>

      <p class="section-title">중재 단계 회기 간 대기시간</p>
      <div class="field-row">
        <input type="number" name="intervention_wait_d" value="0" min="0" />일
        <input type="number" name="intervention_wait_h" value="0" min="0" />시간
        <input type="number" name="intervention_wait_m" value="0" min="0" />분
        <input type="number" name="intervention_wait_s" value="0" min="0" />초
      </div>

      <p class="section-title">유지 단계 회기 간 대기시간</p>
      <div class="field-row">
        <input type="number" name="maintenance_wait_d" value="0" min="0" />일
        <input type="number" name="maintenance_wait_h" value="0" min="0" />시간
        <input type="number" name="maintenance_wait_m" value="0" min="0" />분
        <input type="number" name="maintenance_wait_s" value="0" min="0" />초
      </div>

      <button type="submit">추가</button>
    </form>
  </div>
</body>
</html>
