<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>회기 진행 - ASD Communication Practice System</title>
</head>
<body>
  <p>진행률: {{ progress_current }}/{{ progress_total }}</p>
  <p>친구가 이렇게 보냈어.</p>
  <p>"{{ item.item_text }}"</p>
  <p>친구에게 보낼 답장을 써보세요.</p>

  </form>

</html>
