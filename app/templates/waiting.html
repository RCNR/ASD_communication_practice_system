<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
  <title>대기 중 - ASD Communication Practice System</title>
</head>
<body>
  <a href="/home" class="home-icon-btn" aria-label="홈으로">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
  </a>
  <div class="card">
    <h1>다음 회기까지 기다려 주세요.</h1>
    <p id="countdown" class="countdown">계산 중...</p>
  </div>

  <script>
    const target = new Date("{{ available_at_iso }}").getTime();

    function update() {
      const diff = target - new Date().getTime();
      const el = document.getElementById("countdown");
      if (diff <= 0) {
        el.textContent = "이제 새로고침하면 다음 회기를 시작할 수 있어요.";
        return;
      }
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);
      el.textContent = `${days}일 ${hours}시간 ${minutes}분 ${seconds}초`;
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
