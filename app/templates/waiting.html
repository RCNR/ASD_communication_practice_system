<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>대기 중 - ASD Communication Practice System</title>
</head>
<body>
  <h1>다음 회기까지 기다려 주세요.</h1>
  <p id="countdown">계산 중...</p>

  <script>
    const target = new Date("{{ available_at_iso }}").getTime();

    function update() {
      const diff = target - new Date().getTime();
      const el = document.getElementById("countdown");
      if (diff <= 0) {
        el.textContent = "이제 새로고침하면 다음 회기를 시작할 수 있어요.";
        return;
      }
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);
      el.textContent = `남은 시간: ${days}일 ${hours}시간 ${minutes}분 ${seconds}초`;
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
