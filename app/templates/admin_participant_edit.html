<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
  <title>{{ participant.participant_code }} 수정 - ASD Communication Practice System</title>
</head>
<body>
  <div class="card">
    <p class="nav"><a href="/admin">&larr; 참여자 목록</a></p>
    <h1>{{ participant.participant_code }} 수정</h1>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/participants/{{ participant.participant_code }}/edit">
      <label>기초선 회기 수
        <input type="number" name="baseline_length" value="{{ participant.baseline_length }}" min="1" required />
      </label>
      <label>중재 회기 수
        <input type="number" name="intervention_length" value="{{ participant.intervention_length }}" min="1" required />
      </label>
      <label>유지 회기 수
        <input type="number" name="maintenance_length" value="{{ participant.maintenance_length }}" min="1" required />
      </label>

      <label>현재 단계
        <select name="current_phase">
          <option value="baseline" {% if participant.current_phase == "baseline" %}selected{% endif %}>baseline</option>
          <option value="intervention" {% if participant.current_phase == "intervention" %}selected{% endif %}>intervention</option>
          <option value="maintenance" {% if participant.current_phase == "maintenance" %}selected{% endif %}>maintenance</option>
        </select>
      </label>

      <label>상태
        <select name="status">
          <option value="active" {% if participant.status == "active" %}selected{% endif %}>active</option>
          <option value="paused" {% if participant.status == "paused" %}selected{% endif %}>paused</option>
          <option value="dropped" {% if participant.status == "dropped" %}selected{% endif %}>dropped</option>
        </select>
      </label>

      <label>비밀번호 재설정 (선택, 비워두면 유지)
        <input type="password" name="new_password" />
      </label>

      <button type="submit">저장</button>
    </form>

    <form method="post" action="/admin/participants/{{ participant.participant_code }}/delete"
          onsubmit="return confirm('{{ participant.participant_code }} 참여자와 모든 회기·응답·채점 기록을 영구 삭제합니다. 되돌릴 수 없습니다. 계속할까요?');">
      <button type="submit" class="danger">참여자 삭제</button>
    </form>
  </div>
</body>
</html>
