<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
  <title>회기 종료 - ASD Communication Practice System</title>
</head>
<body>
  <a href="/home" class="home-icon-btn" aria-label="홈으로">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
  </a>
  <div class="card">
    {% if study_finished %}
    <h1>모든 회기를 완료했습니다.</h1>
    <p>연구 참여에 감사드립니다.</p>

    {% else %}
    <h1>오늘 회기가 끝났습니다.</h1>
    <p>참여해 주셔서 감사합니다.</p>

    {% if can_continue %}
    <p>다음 회기를 바로 시작할 수 있어요.</p>
    <form method="get" action="/session">
      <button type="submit">다음 회기 시작하기</button>
    </form>
    {% elif available_at_iso %}
    <p>다음 회기까지 남은 시간</p>
    <p id="countdown" class="countdown">계산 중...</p>
    {% endif %}
    {% endif %}

    <form method="get" action="/logout" style="margin-top: 12px;">
      <button type="submit" class="secondary">로그아웃</button>
    </form>
  </div>

  {% if available_at_iso %}
  <script>
    const target = new Date("{{ available_at_iso }}").getTime();

    function update() {
      const diff = target - new Date().getTime();
      const el = document.getElementById("countdown");
      if (diff <= 0) {
        el.textContent = "이제 새로고침하면 다음 회기를 시작할 수 있어요.";
        return;
      }
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);
      el.textContent = `${days}일 ${hours}시간 ${minutes}분 ${seconds}초`;
    }

    update();
    setInterval(update, 1000);
  </script>
  {% endif %}
</body>
</html>
